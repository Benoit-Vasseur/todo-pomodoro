        <section data-markdown>
          <script type="text/template">
            # POC IA
            ## opencode + skills Matt Pocock

            Benoît Vasseur · Zenika

            2026
          </script>
        </section>

        <section data-markdown>
          <script type="text/template">
            ## 1. Contexte / point de départ

            - Copilot via Cursor/Mission : assez peu utilisé
            - Atelier Zenika : utilisation de **bmad zPlanner**
            - Veille : vidéos, échanges sur le sujet
            - **1h30/jour × 5 jours** avec opencode
            - Tous les commits produits par des agents (via mon poste)
          </script>
        </section>

        <section data-markdown>
          <script type="text/template">
            ## 2. Résultat final — L'application

            - **todo-pomodoro** : app Vue 3 + TypeScript + Tailwind v4 + shadcn-vue
            - Backlog CRUD fonctionnel (issue #2)
            - Drag & drop, dark mode, persistance IndexedDB
            - Déploiement GitHub Pages :
              - Production preview (main)
              - PR previews (éphémères)
              - Rapports de test & coverage déployés
          </script>
        </section>

        <section data-markdown>
          <script type="text/template">
            ## 2. Résultat final — Issues & PRs

            - **15 issues** · **9 PRs** · **94 commits** · **25 branches**
            - Workflow complet : PRD → Issues → Implémentation → Review
            - Labels de triage : `ready-for-agent`, `needs-info`, `wontfix`...
            - Exemple : issue #3 (sous-tâches décoratives) → `wontfix` + ADR #0005
            - Exemple : issue #2 (CRUD backlog) → PR #20, 12 commits en TDD
          </script>
        </section>

        <section data-markdown>
          <script type="text/template">
            ## 3. Outils

            | Outil | Rôle |
            |-------|------|
            | **opencode** | CLI agent sur mon poste |
            | **opencode-go** | Modèle GLM-5.2 (via GO) |
            | **Skills Matt Pocock** | 20 skills métier |
            | **OpenCode GitHub Agent** | Agent auto-déclenché via `/oc` sur les issues |
          </script>
        </section>

        <section data-markdown>
          <script type="text/template">
            ## 3. Flow des skills

            ```
            Grilling ──→ to-prd ──→ to-issues ──→ implement ──→ code-review
              (interview)   (PRD)    (découpage)    (TDD)        (review)
            ```

            Chaque skill produit un artefact concret :
            - **Grill** : questions / décisions validées
            - **to-prd** : PRD publié sur le tracker
            - **to-issues** : issues verticales indépendantes
            - **implement** (via **tdd**) : code + tests
            - **code-review** : rapport standards / spec
          </script>
        </section>

        <section data-markdown>
          <script type="text/template">
            ## 3. Exemple de session — issue #2

            **Backlog CRUD** (PR #20)

            1. Grill → clarifier le périmètre
            2. PRD → rédigé et publié
            3. Issues → 1 seule issue (slice verticale complète)
            4. Implémenté en TDD (tests rouges → verts → refactor)
            5. Review → TODOs.md : 10 items corrigés

            Résultat : backlog fonctionnel avec drag & drop, CRUD complet,
            tests unitaires + composants + e2e, coverage CI
          </script>
        </section>

        <section data-markdown>
          <script type="text/template">
            ## 3. Exemple — déboires

            - **Scope creep** : l'agent en fait parfois trop (review nécessaire)
            - **Path finding** : l'agent a dû corriger `router base path` pour GitHub Pages
            - **Config** : bien paramétrer les modèles en amont (budget, rapidité)
            - **Dépendances** : parfois l'agent installe des libs non demandées
            - **Hallucinations** : références à des modules qui n'existent pas encore
          </script>
        </section>

        <section data-markdown>
          <script type="text/template">
            ## 4. Difficultés — Parallélisation

            Lancer **plusieurs agents en même temps** :
            - Les alimenter en tâches sans perdre le fil
            - Suivre leur progression
            - Gérer interdépendances et goulots d'étranglement
            - Trouver le bon rythme d'enchaînement

            *Pas de solution miracle — l'orchestration manuelle reste clé.*
          </script>
        </section>

        <section data-markdown>
          <script type="text/template">
            ## 4. Difficultés — Budget

            | Modèle | Coût | Usage |
            |--------|------|-------|
            | DeepSeek Flash v4 | ~0 | Triage, grill, tâches simples |
            | GLM-5.2 | ++ | Implémentation fine |

            J'ai cramé mon budget semaine en 3 jours sur GLM-5.2.

            → **Quel modèle pour quel type de tâche ?**
            - DeepSeek pour le triage, le grill, la rédaction
            - GLM pour l'implémentation critique
          </script>
        </section>

        <section data-markdown>
          <script type="text/template">
            ## 4. Difficultés — Appropriation

            - L'agent produit beaucoup, **vite**
            - Tentation de survoler ce qui est généré
            - Risque : ne plus être maître de son code
            - Solution : **review systématique**, rester actif,
              ne pas merger sans comprendre

            *L'agent écrit, le développeur décide.*
          </script>
        </section>

        <section data-markdown>
          <script type="text/template">
            ## 4. Difficultés — Rigueur & Fatigue

            **Rigueur**
            - Sessions parallèles → tentation d'aller vite
            - Checker la qualité, les tests, le scope
            - Tenir le cap sur le plan initial

            **Fatigue**
            - 1h30 en soirée après le boulot
            - Le parallélisme multiplie l'énergie cognitive
            - Trouver son rythme tenable sur la durée
          </script>
        </section>

        <section data-markdown>
          <script type="text/template">
            ## 5. Ouvertures

            - **Mutation testing** (Stryker) sur la stack déjà en place
            - **Sandcastle** (mattpocock/sandcastle) — workflows plus élaborés
            - **OpenCode Web** — interface web pour les sessions
            - **Parallelisation méthodologique** : file d'attente,
              backlog grooming, orchestration outillée
            - **GitLab CI runner** / serveurs agent IA dédiés
            - **Nix** pour environnements reproductibles
          </script>
        </section>

          <script type="text/template">

            Questions ?
