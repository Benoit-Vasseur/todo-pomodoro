name: Pages

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  wait-ci:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      target-dir: ${{ steps.target.outputs.dir }}
      run-id: ${{ steps.wait.outputs.run-id }}
      validate-conclusion: ${{ steps.wait.outputs.validate-conclusion }}
      coverage-conclusion: ${{ steps.wait.outputs.coverage-conclusion }}
    steps:
      - name: Determine publish target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "dir=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "event=pull_request" >> "$GITHUB_OUTPUT"
          else
            echo "dir=main" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "event=push" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for CI run
        id: wait
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ steps.target.outputs.sha }}
          EVENT: ${{ steps.target.outputs.event }}
        run: |
          set -euo pipefail
          APPEAR_DEADLINE=$(( $(date +%s) + 300 ))
          DONE_DEADLINE=$(( $(date +%s) + 1200 ))
          RUN_ID=""
          while [ -z "$RUN_ID" ]; do
            RUN_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$SHA&event=$EVENT" \
              --jq '[.workflow_runs[] | select(.path == ".github/workflows/ci.yml")] | max_by(.id) | .id // empty' 2>/dev/null || true)
            if [ -n "$RUN_ID" ]; then break; fi
            if [ "$(date +%s)" -ge "$APPEAR_DEADLINE" ]; then
              echo "::error::Aucun run ci.yml trouvé pour sha=$SHA event=$EVENT après 5 min"
              exit 1
            fi
            sleep 15
          done
          echo "Found CI run: $RUN_ID"
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"

          while true; do
            STATUS=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID" --jq '.status')
            if [ "$STATUS" = "completed" ]; then break; fi
            if [ "$(date +%s)" -ge "$DONE_DEADLINE" ]; then
              echo "::error::Run ci.yml $RUN_ID non complété après 20 min (status=$STATUS)"
              exit 1
            fi
            sleep 30
          done

          VALIDATE=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/jobs" \
            --jq '.jobs[] | select(.name == "validate") | .conclusion' 2>/dev/null || echo "")
          COVERAGE=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/jobs" \
            --jq '.jobs[] | select(.name == "coverage") | .conclusion' 2>/dev/null || echo "")
          echo "validate=$VALIDATE coverage=$COVERAGE"
          echo "validate-conclusion=${VALIDATE:-unknown}" >> "$GITHUB_OUTPUT"
          echo "coverage-conclusion=${COVERAGE:-unknown}" >> "$GITHUB_OUTPUT"

  publish:
    needs: wait-ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pull-requests: write
    steps:
      - name: Download CI artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ needs.wait-ci.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4

      - name: Publish to gh-pages
        env:
          TARGET: ${{ needs.wait-ci.outputs.target-dir }}
          VALIDATE: ${{ needs.wait-ci.outputs.validate-conclusion }}
          COVERAGE: ${{ needs.wait-ci.outputs.coverage-conclusion }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAGES_BASE: https://benoit-vasseur.github.io/todo-pomodoro
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git clone --branch gh-pages --depth 1 "$REPO_URL" gh-pages-out || {
            mkdir -p gh-pages-out
            cd gh-pages-out
            git init
            git checkout -b gh-pages
            git remote add origin "$REPO_URL"
          }

          cd gh-pages-out
          rm -rf "$TARGET"
          mkdir -p "$TARGET/reports"

          copy_report() {
            local src="$1" dest="$2"
            if [ -d "../$src" ]; then
              rm -rf "$TARGET/reports/$dest"
              cp -a "../$src" "$TARGET/reports/$dest"
              echo "Copied $src -> reports/$dest"
            else
              echo "::warning::Artefact $src absent, reports/$dest non déployé"
            fi
          }
          copy_report vitest-report vitest
          copy_report coverage-vitest coverage-vitest
          copy_report playwright-report playwright
          copy_report coverage-e2e coverage-e2e

          APP_ITEM=""
          if [ "$VALIDATE" = "success" ] && [ -d ../dist ]; then
            mkdir -p "$TARGET/app"
            cp -a ../dist/. "$TARGET/app/"
            APP_ITEM='<li><a href="app/">Application (app preview)</a></li>'
            echo "Copied dist -> app/"
          else
            APP_ITEM='<li>Application non déployée (validate: '"$VALIDATE"')</li>'
          fi

          cat > "$TARGET/index.html" <<HTMLEOF
          <!doctype html>
          <html lang="fr">
          <head>
          <meta charset="utf-8">
          <title>todo-pomodoro — $TARGET</title>
          </head>
          <body>
          <h1>todo-pomodoro — $TARGET</h1>
          <ul>
          $APP_ITEM
          <li><a href="reports/vitest/">Rapport de tests Vitest</a></li>
          <li><a href="reports/coverage-vitest/">Rapport de coverage Vitest</a></li>
          <li><a href="reports/playwright/">Rapport de tests Playwright</a></li>
          <li><a href="reports/coverage-e2e/">Rapport de coverage Playwright (E2E)</a></li>
          </ul>
          </body>
          </html>
          HTMLEOF

          ../.github/scripts/generate-root-index.sh .

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish $TARGET @ ${{ github.sha }}" || echo "No changes to commit"
          git push origin gh-pages

          {
            echo "### Previews déployées sur gh-pages"
            echo ""
            echo "**Target :** \`$TARGET\` — validate: \`$VALIDATE\` — coverage: \`$COVERAGE\`"
            echo ""
            if [ "$VALIDATE" = "success" ]; then
              echo "- [Application (app preview)]($PAGES_BASE/$TARGET/app/)"
            else
              echo "- Application non déployée (validate: $VALIDATE)"
            fi
            echo "- [Rapport de tests Vitest]($PAGES_BASE/$TARGET/reports/vitest/)"
            echo "- [Rapport de coverage Vitest]($PAGES_BASE/$TARGET/reports/coverage-vitest/)"
            echo "- [Rapport de tests Playwright]($PAGES_BASE/$TARGET/reports/playwright/)"
            echo "- [Rapport de coverage Playwright (E2E)]($PAGES_BASE/$TARGET/reports/coverage-e2e/)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate reports comment body
        if: github.event_name == 'pull_request'
        env:
          TARGET: ${{ needs.wait-ci.outputs.target-dir }}
          VALIDATE: ${{ needs.wait-ci.outputs.validate-conclusion }}
          COVERAGE: ${{ needs.wait-ci.outputs.coverage-conclusion }}
          PAGES_BASE: https://benoit-vasseur.github.io/todo-pomodoro
        run: |
          cat > reports-comment.md <<MD
          ### Rapports deployes

          **Target :** \`$TARGET\` — validate: \`$VALIDATE\` — coverage: \`$COVERAGE\`

          $([ "$VALIDATE" = "success" ] && echo "- [Application (app preview)]($PAGES_BASE/$TARGET/app/)" || echo "- Application non déployée")
          - [Rapport de tests Vitest]($PAGES_BASE/$TARGET/reports/vitest/)
          - [Rapport de coverage Vitest]($PAGES_BASE/$TARGET/reports/coverage-vitest/)
          - [Rapport de tests Playwright]($PAGES_BASE/$TARGET/reports/playwright/)
          - [Rapport de coverage Playwright (E2E)]($PAGES_BASE/$TARGET/reports/coverage-e2e/)
          MD

      - name: Publish reports comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: reports
          path: reports-comment.md
